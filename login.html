<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول المشرف — جاليتُنا</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-wrap {
    width: 100%;
    max-width: 420px;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo a {
    font-family: 'Tajawal', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: #c9a96e;
    text-decoration: none;
    letter-spacing: -1px;
  }
  .login-logo p {
    color: #8a9bb0;
    font-size: 13px;
    margin-top: 6px;
  }
  .login-card {
    background: #fff;
    border-radius: 12px;
    padding: 40px 36px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.35);
  }
  .login-card h2 {
    font-size: 20px;
    color: #2c3e50;
    margin-bottom: 6px;
  }
  .login-card .sub {
    font-size: 13px;
    color: #999;
    margin-bottom: 28px;
  }
  .form-group {
    margin-bottom: 18px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 7px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 7px;
    font-family: inherit;
    font-size: 14px;
    color: #333;
    transition: border-color 0.25s, box-shadow 0.25s;
    outline: none;
    direction: ltr;
    text-align: right;
  }
  .form-group input:focus {
    border-color: #c9a96e;
    box-shadow: 0 0 0 3px rgba(201,169,110,0.15);
  }
  .btn-login {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #c9a96e, #b8935a);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.25s, transform 0.15s;
  }
  .btn-login:hover { opacity: 0.93; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .error-msg {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 18px;
    text-align: center;
  }
  .error-msg.show { display: block; }
  .api-settings {
    border: 1px solid #edf0f2;
    border-radius: 8px;
    padding: 0;
    margin-bottom: 18px;
    background: #fafafa;
    color: #5f6b76;
    font-size: 12.5px;
  }
  .api-settings[open] { padding-bottom: 12px; }
  .api-settings summary {
    min-height: 42px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    cursor: pointer;
    font-weight: 700;
    color: #2c3e50;
  }
  .api-settings p {
    padding: 0 14px 10px;
    line-height: 1.7;
  }
  .api-row {
    display: flex;
    gap: 8px;
    padding: 0 14px;
  }
  .api-row input {
    flex: 1;
    min-width: 0;
    min-height: 40px;
    padding: 9px 11px;
    border: 1.5px solid #e0e0e0;
    border-radius: 7px;
    font: inherit;
    font-size: 13px;
    direction: ltr;
    text-align: left;
  }
  .api-row button,
  .api-clear {
    min-height: 40px;
    border: none;
    border-radius: 7px;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
  }
  .api-row button {
    padding: 0 14px;
    background: #2c3e50;
    color: #fff;
  }
  .api-clear {
    margin: 8px 14px 0;
    padding: 0 12px;
    background: transparent;
    color: #9b6b2d;
  }
  .api-current {
    padding: 8px 14px 0;
    line-height: 1.6;
    direction: ltr;
    text-align: left;
    color: #7f8c8d;
    word-break: break-all;
  }
  .api-current.err {
    direction: rtl;
    text-align: right;
    color: #dc2626;
  }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #aaa;
    text-decoration: none;
  }
  .back-link:hover { color: #c9a96e; }
  .login-icon {
    width: 54px;
    height: 54px;
    background: linear-gradient(135deg, #c9a96e, #b8935a);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 22px;
  }
  @media (max-width: 520px) {
    body {
      align-items: flex-start;
      padding: 28px 14px;
    }
    .login-logo { margin-bottom: 22px; }
    .login-logo a {
      font-size: 30px;
      line-height: 1.15;
    }
    .login-logo p {
      font-size: 12px;
      line-height: 1.7;
    }
    .login-card {
      border-radius: 10px;
      padding: 28px 18px;
    }
    .login-card h2 {
      font-size: 18px;
      line-height: 1.5;
    }
    .login-card .sub {
      line-height: 1.7;
      margin-bottom: 22px;
    }
    .form-group input {
      min-height: 44px;
      font-size: 16px;
    }
    .btn-login {
      min-height: 46px;
      line-height: 1.5;
    }
    .api-row {
      flex-direction: column;
    }
    .api-row button,
    .api-clear {
      width: calc(100% - 28px);
      margin-left: 14px;
      margin-right: 14px;
    }
    .api-row button {
      width: 100%;
      margin: 0;
    }
    .back-link {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <a href="index.html">جاليتُنا</a>
    <p>المنصة الأولى للجالية المصرية في لبنان</p>
  </div>

  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>تسجيل دخول المشرف</h2>
    <p class="sub">هذه المنطقة مخصصة للمشرفين فقط</p>

    <div class="error-msg" id="error-msg">اسم المستخدم أو كلمة المرور غير صحيحة</div>

    <details class="api-settings" id="api-settings">
      <summary>إعدادات الخادم</summary>
      <p>إذا كانت الواجهة على GitHub Pages، ضع هنا رابط الـ backend المنشور على Render أو Railway أو أي خدمة مشابهة.</p>
      <div class="api-row">
        <input type="url" id="api-base-input" placeholder="https://your-backend.onrender.com" autocomplete="url">
        <button type="button" id="save-api-base">حفظ</button>
      </div>
      <button type="button" class="api-clear" id="clear-api-base">مسح الرابط</button>
      <div class="api-current" id="api-current"></div>
    </details>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label for="username">اسم المستخدم</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">دخول إلى لوحة التحكم</button>
    </form>

    <a href="index.html" class="back-link">← العودة إلى الموقع</a>
  </div>
</div>

<script src="src/config.js"></script>
<script src="src/api.js"></script>
<script>
  /* If already logged in and token exists, skip login */
  if (sessionStorage.getItem('adminLoggedIn') === 'true' && localStorage.getItem('jalituna_token')) {
    location.replace('admin.html');
  }

  var btn = document.querySelector('.btn-login');
  var err = document.getElementById('error-msg');
  var apiSettings = document.getElementById('api-settings');
  var apiInput = document.getElementById('api-base-input');
  var apiCurrent = document.getElementById('api-current');

  function normalizeApiBase(value) {
    return (value || '').trim().replace(/\/+$/, '');
  }

  function isGithubPages() {
    return /\.github\.io$/i.test(location.hostname);
  }

  function getConfiguredApiBase() {
    return normalizeApiBase((window.JALITUNA_CONFIG && window.JALITUNA_CONFIG.apiBase) || '');
  }

  function setConfiguredApiBase(value) {
    var cleaned = normalizeApiBase(value);
    if (!window.JALITUNA_CONFIG) window.JALITUNA_CONFIG = {};
    window.JALITUNA_CONFIG.apiBase = cleaned;
    window.JALITUNA_CONFIG.needsExternalApi = isGithubPages() && !cleaned;

    try {
      if (cleaned) localStorage.setItem('jalituna_api_base', cleaned);
      else localStorage.removeItem('jalituna_api_base');
    } catch (e) {}

    return cleaned;
  }

  function setApiStatus(message, isError) {
    if (!apiCurrent) return;
    apiCurrent.textContent = message || '';
    apiCurrent.classList.toggle('err', !!isError);
  }

  function refreshApiSettings(message, isError) {
    var apiBase = getConfiguredApiBase();
    if (apiInput) apiInput.value = apiBase;
    if (apiSettings && window.JALITUNA_CONFIG && window.JALITUNA_CONFIG.needsExternalApi) {
      apiSettings.open = true;
    }
    setApiStatus(
      message || (apiBase ? 'API: ' + apiBase : 'لم يتم ضبط رابط backend خارجي بعد.'),
      isError
    );
  }

  function showLoginError(message, openSettings) {
    err.textContent = message;
    err.classList.add('show');
    if (openSettings && apiSettings) apiSettings.open = true;
    setTimeout(function () { err.classList.remove('show'); }, 6000);
  }

  document.getElementById('save-api-base').addEventListener('click', function () {
    var saved = setConfiguredApiBase(apiInput.value);
    refreshApiSettings(saved ? 'تم حفظ رابط API: ' + saved : 'تم مسح رابط API.');
  });

  document.getElementById('clear-api-base').addEventListener('click', function () {
    setConfiguredApiBase('');
    refreshApiSettings('تم مسح الرابط. على GitHub Pages يجب وضع رابط backend منشور.', isGithubPages());
  });

  refreshApiSettings();

  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var user = document.getElementById('username').value.trim();
    var pass = document.getElementById('password').value;

    if (!user || !pass) return;

    var apiBase = getConfiguredApiBase();
    if (isGithubPages() && !apiBase) {
      showLoginError('GitHub Pages لا يشغّل Node.js. ضع رابط backend المنشور في إعدادات الخادم ثم جرّب مرة أخرى.', true);
      refreshApiSettings('ضع رابط backend المنشور مثل: https://your-backend.onrender.com', true);
      return;
    }

    btn.disabled = true;
    btn.textContent = 'جاري التحقق...';

    fetch(apiBase + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    })
    .then(function (r) {
      return r.text().then(function (text) {
        var data = {};
        try { data = text ? JSON.parse(text) : {}; }
        catch (e) { data = { error: 'رابط API لا يرجع JSON. تأكد أن الرابط هو رابط backend وليس رابط GitHub Pages.' }; }
        return { ok: r.ok, status: r.status, data: data };
      });
    })
    .then(function (result) {
      if (result.ok && result.data.token) {
        localStorage.setItem('jalituna_token', result.data.token);
        sessionStorage.setItem('adminLoggedIn', 'true');
        location.replace('admin.html');
      } else {
        throw new Error(result.data.error || ('تعذّر تسجيل الدخول (' + result.status + ')'));
      }
    })
    .catch(function (apiErr) {
      /* Login requires the backend API; localStorage is not used for auth. */
      var message = apiErr.message || 'اسم المستخدم أو كلمة المرور غير صحيحة';
      if (apiErr instanceof TypeError || message === 'Failed to fetch') {
        message = 'تعذّر الاتصال بخادم API. تأكد أن backend يعمل وأن الرابط صحيح: ' + (apiBase || 'نفس النطاق');
      }
      showLoginError(message, true);
      refreshApiSettings(message, true);
      console.error('Login API error:', apiErr, 'API base:', apiBase || '(same origin)');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    })
    .finally(function () {
      btn.disabled = false;
      btn.textContent = 'دخول إلى لوحة التحكم';
    });
  });
</script>
</body>
</html>
