<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول المشرف — جاليتُنا</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-wrap {
    width: 100%;
    max-width: 420px;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo a {
    font-family: 'Tajawal', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: #c9a96e;
    text-decoration: none;
    letter-spacing: -1px;
  }
  .login-logo p {
    color: #8a9bb0;
    font-size: 13px;
    margin-top: 6px;
  }
  .login-card {
    background: #fff;
    border-radius: 12px;
    padding: 40px 36px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.35);
  }
  .login-card h2 {
    font-size: 20px;
    color: #2c3e50;
    margin-bottom: 6px;
  }
  .login-card .sub {
    font-size: 13px;
    color: #999;
    margin-bottom: 28px;
  }
  .form-group {
    margin-bottom: 18px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 7px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 7px;
    font-family: inherit;
    font-size: 14px;
    color: #333;
    transition: border-color 0.25s, box-shadow 0.25s;
    outline: none;
    direction: ltr;
    text-align: right;
  }
  .form-group input:focus {
    border-color: #c9a96e;
    box-shadow: 0 0 0 3px rgba(201,169,110,0.15);
  }
  .btn-login {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #c9a96e, #b8935a);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.25s, transform 0.15s;
  }
  .btn-login:hover { opacity: 0.93; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .error-msg {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 18px;
    text-align: center;
  }
  .error-msg.show { display: block; }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #aaa;
    text-decoration: none;
  }
  .back-link:hover { color: #c9a96e; }
  .login-icon {
    width: 54px;
    height: 54px;
    background: linear-gradient(135deg, #c9a96e, #b8935a);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 22px;
  }
  @media (max-width: 520px) {
    body {
      align-items: flex-start;
      padding: 28px 14px;
    }
    .login-logo { margin-bottom: 22px; }
    .login-logo a {
      font-size: 30px;
      line-height: 1.15;
    }
    .login-logo p {
      font-size: 12px;
      line-height: 1.7;
    }
    .login-card {
      border-radius: 10px;
      padding: 28px 18px;
    }
    .login-card h2 {
      font-size: 18px;
      line-height: 1.5;
    }
    .login-card .sub {
      line-height: 1.7;
      margin-bottom: 22px;
    }
    .form-group input {
      min-height: 44px;
      font-size: 16px;
    }
    .btn-login {
      min-height: 46px;
      line-height: 1.5;
    }
    .back-link {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <a href="index.html">جاليتُنا</a>
    <p>المنصة الأولى للجالية المصرية في لبنان</p>
  </div>

  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>تسجيل دخول المشرف</h2>
    <p class="sub">هذه المنطقة مخصصة للمشرفين فقط</p>

    <div class="error-msg" id="error-msg">اسم المستخدم أو كلمة المرور غير صحيحة</div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label for="username">اسم المستخدم</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">دخول إلى لوحة التحكم</button>
    </form>

    <a href="index.html" class="back-link">← العودة إلى الموقع</a>
  </div>
</div>

<script src="src/config.js"></script>
<script src="src/api.js"></script>
<script>
  /* If already logged in and token exists, skip login */
  if (sessionStorage.getItem('adminLoggedIn') === 'true' && localStorage.getItem('jalituna_token')) {
    location.replace('admin.html');
  }

  var btn = document.querySelector('.btn-login');

  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var user = document.getElementById('username').value.trim();
    var pass = document.getElementById('password').value;
    var err  = document.getElementById('error-msg');

    if (!user || !pass) return;
    btn.disabled = true;
    btn.textContent = 'جاري التحقق...';

    var apiBase = (window.JALITUNA_CONFIG && window.JALITUNA_CONFIG.apiBase) || '';

    fetch(apiBase + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    })
    .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
    .then(function (result) {
      if (result.ok && result.data.token) {
        localStorage.setItem('jalituna_token', result.data.token);
        sessionStorage.setItem('adminLoggedIn', 'true');
        location.replace('admin.html');
      } else {
        throw new Error(result.data.error || 'خطأ');
      }
    })
    .catch(function (apiErr) {
      /* Login requires the backend API; localStorage is not used for auth. */
      err.textContent = apiErr.message || 'اسم المستخدم أو كلمة المرور غير صحيحة';
      err.classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      setTimeout(function () { err.classList.remove('show'); }, 3500);
    })
    .finally(function () {
      btn.disabled = false;
      btn.textContent = 'دخول إلى لوحة التحكم';
    });
  });
</script>
</body>
</html>
