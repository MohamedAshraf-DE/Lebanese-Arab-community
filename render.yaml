services:
  - type: web
    name: jalituna-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DB_PATH
        value: /var/data/jalituna.db
      - key: ALLOWED_ORIGINS
        value: https://mohamedashraf-de.github.io
    disk:
      name: jalituna-data
      mountPath: /var/data
      sizeGB: 1
